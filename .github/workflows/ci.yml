name: CI

on:
  push:
    branches: [main, "claude/*"]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # Python backend tests
  # ============================================================
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-rest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend-rest/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Run tests
        env:
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_KEY: test-key
          JWT_SECRET: test-jwt-secret-32-chars-long-xx
          RESEND_API_KEY: ""
          OWM_API_KEY: ""
          VAPID_PUBLIC_KEY: ""
          VAPID_PRIVATE_KEY: ""
        run: pytest tests/ -v

  # ============================================================
  # Frontend type check
  # ============================================================
  frontend-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

  # ============================================================
  # Frontend build
  # ============================================================
  frontend-build:
    runs-on: ubuntu-latest
    needs: frontend-typecheck
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8001
        run: npm run build
