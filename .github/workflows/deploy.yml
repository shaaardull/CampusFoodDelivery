name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ============================================================
  # Deploy REST API to AWS Lambda via Zappa
  # ============================================================
  deploy-lambda:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-rest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create venv and install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt zappa

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Inject production env vars
        env:
          _SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          _SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          _JWT_SECRET: ${{ secrets.JWT_SECRET }}
          _RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, os
          with open("zappa_settings.json") as f:
              settings = json.load(f)
          settings["production"]["environment_variables"] = {
              "DEV_MODE": "false",
              "SUPABASE_URL": os.environ["_SUPABASE_URL"],
              "SUPABASE_SERVICE_KEY": os.environ["_SUPABASE_SERVICE_KEY"],
              "JWT_SECRET": os.environ["_JWT_SECRET"],
              "RESEND_API_KEY": os.environ["_RESEND_API_KEY"],
          }
          with open("zappa_settings.json", "w") as f:
              json.dump(settings, f, indent=4)
          PYEOF

      - name: Deploy to Lambda
        run: |
          source venv/bin/activate
          zappa update production || zappa deploy production

  # ============================================================
  # Deploy Frontend to EC2 (Next.js standalone build)
  # ============================================================
  deploy-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build standalone
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
        run: |
          npm run build
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public 2>/dev/null || true

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.WS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.WS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            .next/standalone/ ubuntu@${{ secrets.WS_HOST }}:/opt/campusconnect-frontend/

      - name: Copy service file and restart
        run: |
          scp -i ~/.ssh/deploy_key \
            campusconnect-frontend.service \
            ubuntu@${{ secrets.WS_HOST }}:/tmp/campusconnect-frontend.service
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.WS_HOST }} '
            sudo cp /tmp/campusconnect-frontend.service /etc/systemd/system/ &&
            sudo systemctl daemon-reload &&
            sudo systemctl enable campusconnect-frontend &&
            sudo systemctl restart campusconnect-frontend
          '

  # ============================================================
  # Deploy WebSocket Server to EC2
  # ============================================================
  deploy-ws:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.WS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.WS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude '.env' \
            --exclude 'venv/' \
            --exclude '__pycache__/' \
            -e "ssh -i ~/.ssh/deploy_key" \
            backend-ws/ ubuntu@${{ secrets.WS_HOST }}:/opt/campusconnect-ws/

      - name: Install dependencies and restart
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.WS_HOST }} '
            cd /opt/campusconnect-ws &&
            source venv/bin/activate &&
            pip install -r requirements.txt --quiet &&
            sudo systemctl restart campusconnect-ws
          '

      - name: Reload nginx config
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.WS_HOST }} '
            sudo cp /opt/campusconnect-ws/nginx.conf /etc/nginx/sites-available/campusconnect &&
            sudo ln -sf /etc/nginx/sites-available/campusconnect /etc/nginx/sites-enabled/ &&
            sudo nginx -t &&
            sudo systemctl reload nginx
          '
